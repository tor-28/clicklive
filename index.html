<style>
  .contato-lista{
    display:flex;
    justify-content:center;
    align-items:stretch;
    gap:18px;
    margin-top:14px;
    flex-wrap:nowrap;
    width:100%;
  }

  .contact-card{
    display:flex;
    align-items:center;
    gap:18px;
    flex:1 1 0;
    max-width:340px;
    min-height:170px;
    background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:24px;
    transition:all .20s ease;
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    box-shadow:0 10px 25px rgba(0,0,0,0.22);
  }

  .contact-card:hover{
    transform:translateY(-5px);
    border-color:rgba(255,191,90,0.34);
    box-shadow:0 16px 34px rgba(0,0,0,0.30);
  }

  .contact-card.clickable{
    cursor:pointer;
  }

  .contact-icon{
    width:68px;
    height:68px;
    min-width:68px;
    border-radius:20px;
    background:rgba(255,191,90,0.10);
    border:1px solid rgba(255,255,255,0.08);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    box-shadow:inset 0 0 18px rgba(255,191,90,0.06);
  }

  .contact-icon svg{
    width:30px;
    height:30px;
    stroke:currentColor;
    fill:none;
    stroke-width:2.2;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .contact-text{
    flex:1;
  }

  .contact-text small{
    display:block;
    color:#c3cede;
    font-size:14px;
    font-weight:700;
    margin-bottom:8px;
  }

  .contact-text strong{
    display:block;
    color:#fff;
    font-size:18px;
    line-height:1.45;
    margin-bottom:10px;
  }

  .contact-text span{
    display:block;
    color:#98a9c1;
    font-size:14px;
    line-height:1.55;
  }

  .contact-action{
    margin-top:14px;
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:11px 14px;
    border-radius:14px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.09);
    color:#fff;
    font-weight:800;
    font-size:14px;
    transition:all .18s ease;
  }

  .clickable:hover .contact-action{
    border-color:rgba(255,191,90,0.36);
    color:#ffcf3f;
    transform:translateX(2px);
  }

  .contact-action svg{
    width:16px;
    height:16px;
    stroke:currentColor;
    fill:none;
    stroke-width:2.4;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  @media (max-width: 980px){
    .contato-lista{
      flex-wrap:wrap;
    }

    .contact-card{
      max-width:100%;
      min-width:280px;
    }
  }

  @media (max-width: 760px){
    .contato-lista{
      flex-direction:column;
      align-items:center;
    }

    .contact-card{
      width:100%;
      max-width:100%;
      min-height:auto;
    }
  }
</style>
